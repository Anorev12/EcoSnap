<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EcoSnap – Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="register-style.css"/>
</head>
<body>

<div class="screen">

  <a class="back-link" href="loginscreen.html">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 4L7 10L13 16" stroke="#4dd97a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back to Login
  </a>

  <div class="heading">Create Account</div>
  <p class="sub">Join EcoSnap and start recycling smarter</p>

  <div class="card">
    <div class="fields-grid">
      <div class="field">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" autocomplete="name"/>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" autocomplete="new-password"/>
      </div>
    </div>

    <p class="already-line">Already have an Account? <a href="loginscreen.html">Sign In</a></p>
  </div>

  <div class="btn-wrap">
    <button class="btn-register" onclick="window.location.href='dashboard.html'">Register</button>
  </div>

</div>

</body>
</html>
