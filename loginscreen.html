<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EcoSnap - Login</title>
  <link rel="stylesheet" href="logscreen.css">
</head>
<body>

  <div class="container">
    <div class="left">
        <div class="left-content">
           <div class="logo img">
              <img src="Logo/EcoSnap_LOGO_4.png">
           </div>
           <div class="tagline">
              <h1>Snap it.</h1>
              <h1>Know it.</h1>
              <h1>Green it.</h1>
           </div>
        </div>
    </div>
    <div class="right">
      <div class="card">
        <h2>Welcome!</h2>
        <p>Sign in to your Account</p>

        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" placeholder="Enter your password">

        <p class="register">Don’t Have an Account? <a href="register.html">Register</a></p>

        <button class="login-btn" onclick="window.location.href='dashboard.html'">LOGIN</button>
      </div>
    </div>
  </div>

</body>
</html>
